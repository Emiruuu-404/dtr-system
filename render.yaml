services:
  - type: web
    name: dtr-system-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn ojt_backend.wsgi:application
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: dtr-system-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://dtr-system-frontend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://dtr-system-frontend.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: dtr-system-db
          property: connectionString

  - type: web
    name: dtr-system-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: VITE_API_URL
        value: https://dtr-system-backend.onrender.com

databases:
  - name: dtr-system-db
    plan: free
